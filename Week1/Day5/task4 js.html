<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #profileCard {
            width: 300px;
            margin: 20px auto;
            padding: 15px;
            border: 2px solid black;
            border-radius: 8px;
            background-color: #f2f2f2;
        }

        button {
            padding: 6px 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Student Profile Manager</h2>

    <div id="profileCard"></div>

    <input type="number" id="marksInput" placeholder="Enter new marks">
    <br><br>
    <button id="updateBtn">Update Marks</button>

    <script>

        // ✅ Global student object
        let student = {
            name: "Anji",
            rollNo: 101,
            marks: 75
        };

        // Function to display student profile
        function updateStudentProfile(studentObj) {
            const profileDiv = document.getElementById("profileCard");

            profileDiv.innerHTML =
                "<h3>" + studentObj.name + "</h3>" +
                "<p><strong>Roll No:</strong> " + studentObj.rollNo + "</p>" +
                "<p><strong>Marks:</strong> " + studentObj.marks + "</p>";
        }

        // Function to update marks
        function updateMarks(newMarks) {
            student.marks = newMarks;   // update global object
            updateStudentProfile(student); // refresh display
        }

        // Event listener (No inline JS)
        document.getElementById("updateBtn")
            .addEventListener("click", function() {
                const value = document.getElementById("marksInput").value;
                updateMarks(Number(value));
            });

        // Initial display
        updateStudentProfile(student);

    </script>

</body>
</html>
