<!DOCTYPE html>
<html>
<head>
    <title>Product Cart Summary</title>
</head>
<body>

<h2> Shopping Cart Summary</h2>
<button onclick="printCartSummary()">Generate Invoice</button>

<pre id="output"></pre>

<script>

    const products = [
        { name: "Laptop", price: 50000, quantity: 1 },
        { name: "Mouse", price: 500, quantity: 2 },
        { name: "Keyboard", price: 1500, quantity: 1 }
    ];

    // Calculate total using reduce()
    const calculateTotal = (items) =>
        items.reduce((total, item) => total + item.price * item.quantity, 0);

    // Generate invoice using map()
    const generateInvoice = (items) => {

        const invoiceLines = items.map(item =>
            `${item.name} | ₹${item.price} x ${item.quantity} = ₹${item.price * item.quantity}`
        );

        const totalAmount = calculateTotal(items);

        return `
Shopping Cart Invoice
----------------------------
${invoiceLines.join("\n")}
----------------------------
Total Amount: ₹${totalAmount}
`;
    };

    function printCartSummary() {
        const invoice = generateInvoice(products);
        document.getElementById("output").textContent = invoice;
    }

</script>

</body>
</html>
