<!DOCTYPE html>
<html>
<head>
    <title>Interactive To-Do List</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial;
            background-color: #b9f4b9;
        }
        .container{
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #bc9292;
        }
        input{
            width: 65%;
            padding: 8px;
        }
        button{
            padding: 8px 12px;
            border: none;
            cursor: pointer;
        }
        .addBtn{
            background-color: #007bff;
            color: white;
        }
        ul{
            list-style: none;
            padding: 0;
        }
        li{
            padding: 8px;
            margin-top: 8px;
            background-color: #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .completed{
            text-decoration: line-through;
            color: gray;
        }
        .deleteBtn{
            background-color: red;
            color: white;
            margin-left: 5px;
        }
        .completeBtn{
            background-color: green;
            color: white;
        }
        .counts{
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button class="addBtn">Add</button>

    <ul id="taskList"></ul>

    <div class="counts">
        Total Tasks: <span id="totalCount">0</span> |
        Completed Tasks: <span id="completedCount">0</span>
    </div>
</div>

<script>
$(document).ready(function(){

    function updateCounts(){
        var total = $("#taskList li").length;
        var completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    $(".addBtn").on("click", function(){

        var taskText = $("#taskInput").val().trim();

        if(taskText !== ""){
            $("#taskList").append(
                "<li>" + 
                "<span class='taskText'>" + taskText + "</span>" +
                "<div>" +
                "<button class='completeBtn'>Complete</button>" +
                "<button class='deleteBtn'>Delete</button>" +
                "</div>" +
                "</li>"
            );

            $("#taskInput").val("");
            updateCounts();
        }

    });
    $("#taskList").on("click", ".completeBtn", function(){
        $(this).closest("li").toggleClass("completed");
        updateCounts();
    });
    $("#taskList").on("click", ".deleteBtn", function(){
        $(this).closest("li").remove();
        updateCounts();
    });

});
</script>

</body>
</html>
