<!DOCTYPE html>
<html>
<head>
    <title>Interactive Feedback</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
        
    </style>
</head>

<body>

    <h2>Feedback Page</h2>
   

    <button id="feedbackBtn">Submit Feedback</button>

    <div id="message"></div>

    <script>
        const button = document.getElementById("feedbackBtn");

        const messageDiv = document.getElementById("message");
        button.addEventListener("click", () => {

            messageDiv.textContent = "Thank you! Your feedback has been submitted successfully.";

        });
    </script>

</body>
</html>
