<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }
        h2 {
            font-size: 28px;
            color: brown;
        }
        button {
            padding: 8px 15px;
            margin: 5px;
            font-size: 16px;
            background-color: rgb(216, 240, 132);

        }
       
    </style>
</head>
<body>

    <h2>Counter App</h2>

    <p id="counterValue">0</p>

    <button id="incrementBtn">Increment</button>
    <button id="resetBtn">Reset</button>

    <script>
        //  Global variable (outside functions)
        let counter = 0;

        // Function to update UI
        function updateDisplay() {
            document.getElementById("counterValue").textContent = counter;
        }

        // Function to increment counter
        function incrementCounter(step) {
            counter += step;   // using parameter
            updateDisplay();   // DOM update inside function
        }

        // Function to reset counter
        function resetCounter() {
            counter = 0;
            updateDisplay();
        }

        // Add event listeners (No inline JS)
        document.getElementById("incrementBtn")
                .addEventListener("click", function() {
                    incrementCounter(1);
                });

        document.getElementById("resetBtn")
                .addEventListener("click", resetCounter);
    </script>

</body>
</html>
