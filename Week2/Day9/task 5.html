<!DOCTYPE html>
<html>
<head>
    <title>Electronics Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2 class="text-center mb-5 fw-bold">Electronics Store</h2>

    <div class="row g-4">

        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 bg-primary-subtle shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text text-muted">Latest 5G smartphone with high performance.</p>
                    <h6 class="mt-auto">₹25,000</h6>
                    <div class="mt-3 d-grid gap-2">
                        <button class="btn btn-primary">Add to Cart</button>
                        <button class="btn btn-warning">View Details</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 bg-success-subtle shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text text-muted">Powerful laptop for coding and gaming.</p>
                    <h6 class="mt-auto">₹70,000</h6>
                    <div class="mt-3 d-grid gap-2">
                        <button class="btn btn-success">Add to Cart</button>
                        <button class="btn btn-dark">View Details</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 bg-danger-subtle shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Wireless Headphones</h5>
                    <p class="card-text text-muted">Noise-cancelling premium headphones.</p>
                    <h6 class="mt-auto">₹3,500</h6>
                    <div class="mt-3 d-grid gap-2">
                        <button class="btn btn-danger">Add to Cart</button>
                        <button class="btn btn-info">View Details</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 bg-warning-subtle shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text text-muted">Track fitness and notifications easily.</p>
                    <h6 class="mt-auto">₹6,000</h6>
                    <div class="mt-3 d-grid gap-2">
                        <button class="btn btn-warning">Add to Cart</button>
                        <button class="btn btn-secondary">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
